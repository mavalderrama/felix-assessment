services:
  # ── Application Database (PostgreSQL 18) ─────────────────
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: send_money
      POSTGRES_USER: send_money
      POSTGRES_PASSWORD: send_money
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U send_money -d send_money"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Langfuse Observability Stack ──────────────────────────
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: send_money
      CLICKHOUSE_USER: send_money
      CLICKHOUSE_PASSWORD: send_money
    volumes:
      - langfuse_chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user send_money --password send_money --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse_dev
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-minio-init:
    image: minio/mc
    entrypoint: >
      sh -c "
      until mc alias set myminio http://langfuse-minio:9000 langfuse langfuse_dev; do sleep 1; done &&
      mc mb --ignore-existing myminio/langfuse
      "
    depends_on:
      langfuse-minio:
        condition: service_healthy

  langfuse-server:
    image: langfuse/langfuse:latest
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: postgresql://send_money:send_money@postgres:5432/send_money
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://send_money:send_money@langfuse-clickhouse:9000
      CLICKHOUSE_USER: send_money
      CLICKHOUSE_PASSWORD: send_money
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse_dev
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_SECRET: local-dev-secret-change-in-prod
      SALT: local-dev-salt-change-in-prod
      NEXTAUTH_URL: http://localhost:3010
      LANGFUSE_INIT_ORG_ID: local-dev
      LANGFUSE_INIT_ORG_NAME: "Local Dev"
      LANGFUSE_INIT_PROJECT_ID: send-money-agent
      LANGFUSE_INIT_PROJECT_NAME: "Send Money Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-dev
      LANGFUSE_INIT_USER_EMAIL: dev@localhost.local
      LANGFUSE_INIT_USER_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  langfuse_pgdata:
  langfuse_chdata:
  langfuse_minio:
